<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kő-Papír-Olló - Komoly Verzió</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Kő - Papír - Olló</h1>
        <p class="subtitle">Készülj fel a harcra...</p>
        <div class="choices">
            <button class="choice" onclick="play('kő')">
                <img src="ko.png" alt="Kő" title="Kő">
            </button>
            <button class="choice" onclick="play('papír')">
                <img src="papir.png" alt="Papír" title="Papír"> 
            </button>
            <button class="choice" onclick="play('olló')">
                <img src="ollo.jpeg" alt="Olló" title="Olló">
            </button>
        </div>
        <p id="result" class="result"></p>
        <div class="scoreboard">
            <p>Győzelmek: <span id="wins">0</span></p>
            <p>Vereségek: <span id="losses">0</span></p>
            <p>Döntetlenek: <span id="ties">0</span></p>
        </div>
        <button class="reset" onclick="resetGame()">🔄 Újraindítás</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
